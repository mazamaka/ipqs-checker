<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты проверки - IPQS Checker</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e0;
            --muted: #6b7280;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        .header h1 {
            font-size: 1.8em;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: var(--muted); margin-top: 8px; }
        .loading {
            text-align: center;
            padding: 80px 20px;
        }
        .loader {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--muted); }
        .score-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 800px) {
            .score-section { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 500px) {
            .score-section { grid-template-columns: 1fr; }
        }
        .score-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .score-value {
            font-size: 3.5em;
            font-weight: 700;
            line-height: 1;
        }
        .score-value.low { color: var(--success); }
        .score-value.medium { color: var(--warning); }
        .score-value.high { color: var(--danger); }
        .score-label {
            color: var(--muted);
            font-size: 0.9em;
            margin-top: 8px;
        }
        .score-desc {
            color: var(--muted);
            font-size: 0.75em;
            margin-top: 4px;
            opacity: 0.7;
        }
        .verdict {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
            margin-top: 12px;
            font-size: 0.85em;
        }
        .verdict.low { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .verdict.medium { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .verdict.high { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .alerts {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(220, 38, 38, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .alerts h3 {
            color: var(--danger);
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .alert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
        }
        .alert-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 0.85em;
            position: relative;
        }
        .alert-item.danger { border-left: 3px solid var(--danger); }
        .alert-item.warning { border-left: 3px solid var(--warning); }
        .alert-item.unknown { border-left: 3px solid var(--muted); opacity: 0.7; }
        .alert-item.ok { border-left: 3px solid var(--success); opacity: 0.6; }
        .alert-item[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            white-space: nowrap;
            z-index: 10;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-weight: 600;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--accent);
            color: white;
        }
        .card-body { padding: 4px 0; }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .row:last-child { border-bottom: none; }
        .row:hover { background: rgba(255,255,255,0.02); }
        .row.critical { background: rgba(239, 68, 68, 0.08); }
        .row-left { display: flex; flex-direction: column; gap: 2px; }
        .row-label {
            color: var(--muted);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .row-hint {
            font-size: 0.7em;
            color: var(--muted);
            opacity: 0.6;
        }
        .row-value {
            font-size: 0.9em;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
            font-family: 'SF Mono', 'Monaco', monospace;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .row-value:hover {
            color: var(--accent);
        }
        .row-value.copied {
            color: var(--success) !important;
        }
        .row-value[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            right: 0;
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            white-space: nowrap;
        }
        .row-value.hash {
            font-size: 0.8em;
            color: var(--muted);
        }
        .row-value.na {
            color: var(--warning);
            opacity: 0.8;
        }
        .row-value.danger {
            color: var(--danger);
        }
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .tag.yes { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .tag.no { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .tag.info { background: rgba(59, 130, 246, 0.15); color: var(--accent); }
        .critical-marker {
            width: 6px;
            height: 6px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .json-panel { margin-top: 24px; }
        .json-toggle {
            width: 100%;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .json-toggle:hover { background: var(--border); }
        .json-box {
            display: none;
            margin-top: 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.8em;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 500px;
            overflow-y: auto;
            color: #8b949e;
        }
        .hidden { display: none; }
        .error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255, 71, 87, 0.5);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--muted);
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Device Fingerprint Analysis</h1>
            <p>Результаты проверки IPQS</p>
        </div>

        <div id="loading" class="loading">
            <div class="loader"></div>
            <p class="loading-text">Загрузка результатов...</p>
        </div>

        <div id="result" class="hidden"></div>

        <div id="error" class="error hidden">
            <div style="font-size: 1.2em; margin-bottom: 10px;">Результаты не найдены</div>
            <div style="color: var(--muted);">Возможно, проверка ещё не завершена или сессия истекла</div>
            <a href="/" class="btn">Попробовать снова</a>
        </div>

        <div class="footer">
            Device Fingerprint Analysis via IPQS
        </div>
    </div>

    <script>
        const sessionId = new URLSearchParams(window.location.search).get('session');
        let jsonData = null;

        const $ = id => document.getElementById(id);

        // Копирование в буфер при клике
        async function copyToClipboard(text, el) {
            try {
                await navigator.clipboard.writeText(text);
                const original = el.textContent;
                el.classList.add('copied');
                el.setAttribute('data-tooltip', 'Скопировано!');
                setTimeout(() => {
                    el.classList.remove('copied');
                    el.removeAttribute('data-tooltip');
                }, 1500);
            } catch (e) {
                console.error('Copy failed:', e);
            }
        }

        function tag(val, yesIsBad = true) {
            if (val === true) return `<span class="tag ${yesIsBad ? 'yes' : 'no'}">Yes</span>`;
            if (val === false) return `<span class="tag ${yesIsBad ? 'no' : 'yes'}">No</span>`;
            return `<span class="tag info">N/A</span>`;
        }

        // critical: 'danger' = красный (детект), false = обычный (N/A будет оранжевым автоматически)
        function row(label, value, hint = '', critical = false, isHash = false) {
            const v = value ?? '-';
            const isHTML = typeof v === 'string' && v.includes('<');
            const isNA = !isHTML && (v === 'N/A' || v === '-' || v === 0 || v === '0');
            const rowCls = critical === 'danger' ? ' critical' : '';
            const valCls = isHash ? ' hash' : '';
            // danger = реальный детект, na = просто нет данных
            const statusCls = critical === 'danger' ? ' danger' : (isNA ? ' na' : '');
            const marker = critical === 'danger' ? '<span class="critical-marker"></span>' : '';

            // Для HTML (tags) не добавляем onclick
            let valueHtml;
            if (isHTML) {
                valueHtml = `<span class="row-value">${v}</span>`;
            } else {
                const copyVal = typeof v === 'string' ? v.replace(/'/g, "\\'") : v;
                valueHtml = `<span class="row-value${valCls}${statusCls}" onclick="copyToClipboard('${copyVal}', this)" title="Клик для копирования">${v}</span>`;
            }

            return `<div class="row${rowCls}">
                <div class="row-left">
                    <span class="row-label">${marker}${label}</span>
                    ${hint ? `<span class="row-hint">${hint}</span>` : ''}
                </div>
                ${valueHtml}
            </div>`;
        }

        function render(d) {
            jsonData = d;
            $('loading').classList.add('hidden');
            $('error').classList.add('hidden');
            $('result').classList.remove('hidden');

            const fraud = d.fraud_chance || 0;
            let scoreClass = fraud >= 75 ? 'high' : fraud >= 50 ? 'medium' : 'low';
            let verdictText = fraud >= 75 ? 'Высокий риск' : fraud >= 50 ? 'Средний риск' : 'Низкий риск';

            // Маппинг родственных ОС (дистрибутив → базовая ОС)
            const osFamily = {
                'ubuntu': 'linux', 'debian': 'linux', 'fedora': 'linux', 'centos': 'linux',
                'arch': 'linux', 'manjaro': 'linux', 'mint': 'linux', 'kali': 'linux',
                'chrome os': 'linux', 'chromeos': 'linux',
                'macos': 'mac', 'mac os': 'mac', 'os x': 'mac',
                'ios': 'ios', 'iphone': 'ios', 'ipad': 'ios',
                'android': 'android'
            };
            const normalizeOs = (os) => {
                if (!os) return '';
                const lower = os.toLowerCase().trim();
                return osFamily[lower] || lower.split(' ')[0];
            };
            const osMismatch = d.true_os && d.operating_system &&
                normalizeOs(d.true_os) !== normalizeOs(d.operating_system);
            const tzMismatch = d.timezone && d.device_timezone && d.timezone !== d.device_timezone;

            // bad = реальный детект (красный), unknown = нет данных (серый), ok = всё хорошо (зелёный)
            const alerts = [
                { text: 'OS Mismatch', bad: osMismatch, unknown: false, hint: 'Несовпадение реальной и заявленной ОС' },
                { text: 'Timezone Mismatch', bad: tzMismatch, unknown: false, hint: 'Несовпадение часовых поясов' },
                { text: 'Canvas Hash', bad: false, unknown: !d.canvas_hash, hint: 'Уникальный отпечаток Canvas' },
                { text: 'WebGL Hash', bad: false, unknown: !d.webgl_hash, hint: 'Уникальный отпечаток WebGL' },
                { text: 'Memory', bad: false, unknown: !d.memory || d.memory === 0, hint: 'Объём RAM устройства' },
                { text: 'Audio Hash', bad: false, unknown: !d.audio_hash, hint: 'Уникальный аудио отпечаток' },
                { text: 'Bot Detection', bad: d.bot_status, unknown: false, hint: 'Обнаружен бот/автоматизация' },
                { text: 'Proxy/VPN', bad: d.proxy || d.vpn || d.active_vpn, unknown: false, hint: 'Использование прокси/VPN' }
            ];

            const res = d.resolution
                ? (Array.isArray(d.resolution) ? d.resolution.join(' x ') : d.resolution)
                : 'N/A';

            $('result').innerHTML = `
                <div class="score-section">
                    <div class="score-card">
                        <div class="score-value ${scoreClass}">${fraud}%</div>
                        <div class="score-label">Fraud Score</div>
                        <div class="score-desc">Вероятность мошенничества</div>
                        <div class="verdict ${scoreClass}">${verdictText}</div>
                    </div>
                    <div class="score-card">
                        <div class="score-value" style="font-size:2.5em">${d.guid_confidence || 0}%</div>
                        <div class="score-label">GUID Confidence</div>
                        <div class="score-desc">Уверенность в идентификации устройства</div>
                        <div class="verdict ${d.unique ? 'low' : 'high'}">${d.unique ? 'Уникальное устройство' : 'Известное устройство'}</div>
                    </div>
                    <div class="score-card">
                        <div class="score-value" style="font-size:2.5em; color: ${(d._visit_count || 1) > 1 ? 'var(--warning)' : 'var(--success)'}">${d._visit_count || 1}</div>
                        <div class="score-label">Visit Count</div>
                        <div class="score-desc">Количество проверок этого устройства</div>
                        <div class="verdict ${(d._visit_count || 1) > 1 ? 'medium' : 'low'}">${(d._visit_count || 1) === 1 ? 'Первый визит' : 'Повторный визит'}</div>
                    </div>
                </div>

                <div class="alerts">
                    <h3>Критичные параметры</h3>
                    <div class="alert-grid">
                        ${alerts.map(a => {
                            let cls, icon;
                            if (a.bad) {
                                cls = 'danger';
                                icon = '✗';
                            } else if (a.unknown) {
                                cls = 'unknown';
                                icon = '?';
                            } else {
                                cls = 'ok';
                                icon = '✓';
                            }
                            return `<div class="alert-item ${cls}" title="${a.hint}">${icon} ${a.text}</div>`;
                        }).join('')}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Детекции</span>
                    </div>
                    <div class="card-body">
                        ${row('Bot Status', tag(d.bot_status), 'Автоматизированный доступ')}
                        ${row('Proxy', tag(d.proxy), 'Использование прокси-сервера')}
                        ${row('VPN', tag(d.vpn), 'VPN соединение')}
                        ${row('Active VPN', tag(d.active_vpn), 'Активный VPN в момент проверки')}
                        ${row('Tor', tag(d.tor), 'Сеть Tor')}
                        ${row('Crawler', tag(d.is_crawler), 'Поисковый робот')}
                        ${row('High Risk Device', tag(d.high_risk_device), 'Устройство с высоким риском')}
                        ${row('Recent Abuse', tag(d.recent_abuse), 'Недавние нарушения с IP')}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">
                            <span class="critical-marker"></span>
                            Fingerprints
                        </span>
                        <span class="card-badge">UNIQUE ID</span>
                    </div>
                    <div class="card-body">
                        ${row('Canvas Hash', d.canvas_hash || 'N/A', 'Отпечаток рендеринга Canvas', false, true)}
                        ${row('WebGL Hash', d.webgl_hash || 'N/A', 'Отпечаток 3D рендеринга', false, true)}
                        ${row('Audio Hash', d.audio_hash || 'N/A', 'Отпечаток аудио контекста', false, true)}
                        ${row('SSL Fingerprint', d.ssl_fingerprint || 'N/A', 'TLS/SSL отпечаток соединения', false, true)}
                        ${row('Device ID', d.device_id || 'N/A', 'Уникальный ID устройства', false, true)}
                        ${row('GUID', d.guid || 'N/A', 'Глобальный ID пользователя', false, true)}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Железо и окружение</span>
                    </div>
                    <div class="card-body">
                        ${row('Resolution', res, 'Разрешение экрана')}
                        ${row('CPU Cores', d.cpu_cores || 'N/A', 'Количество ядер процессора')}
                        ${row('Memory (GB)', d.memory || 'N/A', 'Объём оперативной памяти')}
                        ${row('Graphics Card', d.graphics_card || 'N/A', 'Видеокарта/GPU')}
                        ${row('Browser Timezone', d.device_timezone || 'N/A', 'Часовой пояс браузера', tzMismatch ? 'danger' : false)}
                        ${row('IP Timezone', d.timezone || 'N/A', 'Часовой пояс по IP', tzMismatch ? 'danger' : false)}
                        ${row('Language', d.language || 'N/A', 'Язык браузера')}
                        ${row('User Agent', d.user_agent || 'N/A', 'Строка User-Agent')}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Сеть</span>
                    </div>
                    <div class="card-body">
                        ${row('IP Address', d.ip_address, 'Внешний IP адрес')}
                        ${row('Country', d.country, 'Страна по GeoIP')}
                        ${row('City', d.city, 'Город по GeoIP')}
                        ${row('ISP', d.isp, 'Интернет-провайдер')}
                        ${row('Organization', d.organization, 'Организация-владелец IP')}
                        ${row('Connection Type', d.connection_type, 'Тип подключения')}
                        ${row('Interface', d.interface, 'Сетевой интерфейс')}
                        ${row('MTU', d.mtu, 'Максимальный размер пакета')}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Устройство</span>
                    </div>
                    <div class="card-body">
                        ${row('Device Type', d.device, 'Тип устройства')}
                        ${row('OS (Fingerprint)', d.operating_system, 'ОС по fingerprint', osMismatch ? 'danger' : false)}
                        ${row('OS (Detected)', d.true_os, 'Реальная ОС', osMismatch ? 'danger' : false)}
                        ${row('Browser', d.browser, 'Браузер и версия')}
                        ${row('Mobile', tag(d.mobile, false), 'Мобильное устройство')}
                        ${row('Plugins', d.plugins ? d.plugins.length + ' шт.: ' + d.plugins.map(p => p.name).join(', ') : 'N/A', 'Установленные плагины браузера')}
                        ${row('Private Browsing', tag(d.private_browser), 'Приватный режим')}
                        ${row('Do Not Track', tag(d.do_not_track, false), 'Заголовок DNT')}
                    </div>
                </div>

                ${(d.first_seen || d.last_seen) ? `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">История устройства (IPQS)</span>
                    </div>
                    <div class="card-body">
                        ${row('First Seen', d.first_seen || 'N/A', 'Первое появление в IPQS')}
                        ${row('Last Seen', d.last_seen || 'N/A', 'Последнее появление в IPQS')}
                    </div>
                </div>
                ` : ''}

                <div class="json-panel">
                    <button class="json-toggle" onclick="toggleJson()">Показать полный JSON</button>
                    <pre class="json-box" id="jsonBox">${JSON.stringify(d, null, 2)}</pre>
                </div>
            `;
        }

        function toggleJson() {
            const box = $('jsonBox');
            const isHidden = getComputedStyle(box).display === 'none';
            box.style.display = isHidden ? 'block' : 'none';
        }

        function showError() {
            $('loading').classList.add('hidden');
            $('error').classList.remove('hidden');
        }

        async function loadResult() {
            if (!sessionId) {
                showError();
                return;
            }

            try {
                const resp = await fetch('/api/extension/result/' + sessionId);
                const data = await resp.json();

                if (data.fingerprint) {
                    render(data.fingerprint);
                } else if (data.status === 'pending') {
                    setTimeout(loadResult, 1000);
                } else {
                    showError();
                }
            } catch (e) {
                showError();
            }
        }

        loadResult();
    </script>
</body>
</html>
