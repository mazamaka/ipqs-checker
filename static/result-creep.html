<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты проверки - CreepJS</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e0;
            --muted: #6b7280;
            --accent: #10b981;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: blobFloat 20s ease-in-out infinite;
        }
        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            bottom: -50px;
            left: -100px;
            animation-delay: -7s;
        }
        .blob-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }
        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -20px) scale(1.02); }
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        .header h1 {
            font-size: 1.8em;
            font-weight: 600;
            background: linear-gradient(135deg, #10b981, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: var(--muted); margin-top: 8px; }
        .loading {
            text-align: center;
            padding: 80px 20px;
        }
        .loader {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--muted); }

        .score-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 800px) {
            .score-section { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 500px) {
            .score-section { grid-template-columns: 1fr; }
        }
        .score-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .score-value {
            font-size: 3.5em;
            font-weight: 700;
            line-height: 1;
        }
        .score-value.low { color: var(--success); }
        .score-value.medium { color: var(--warning); }
        .score-value.high { color: var(--danger); }
        .score-label {
            color: var(--muted);
            font-size: 0.9em;
            margin-top: 8px;
        }
        .score-desc {
            color: var(--muted);
            font-size: 0.75em;
            margin-top: 4px;
            opacity: 0.7;
        }
        .verdict {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
            margin-top: 12px;
            font-size: 0.85em;
        }
        .verdict.low { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .verdict.medium { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .verdict.high { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* Headless alert */
        .headless-alert {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.1));
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        .headless-alert.detected {
            animation: pulseAlert 2s infinite;
        }
        @keyframes pulseAlert {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0.2); }
        }
        .headless-alert h2 {
            color: var(--danger);
            font-size: 1.5em;
            margin-bottom: 8px;
        }
        .headless-alert p {
            color: var(--text);
            opacity: 0.8;
        }
        .headless-alert.safe {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
            border-color: rgba(16, 185, 129, 0.5);
        }
        .headless-alert.safe h2 {
            color: var(--success);
        }
        .headless-alert.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
            border-color: rgba(245, 158, 11, 0.5);
        }
        .headless-alert.warning h2 {
            color: var(--warning);
        }

        /* FP ID Card */
        .fp-id-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .fp-id-icon {
            font-size: 2.5em;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 12px;
            flex-shrink: 0;
        }
        .fp-id-content { flex: 1; }
        .fp-id-label {
            color: var(--muted);
            font-size: 0.85em;
            margin-bottom: 4px;
        }
        .fp-id-value {
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 1.1em;
            color: var(--accent);
            cursor: pointer;
            transition: color 0.2s;
        }
        .fp-id-value:hover { color: var(--text); }
        .fp-id-fuzzy {
            font-size: 0.8em;
            color: var(--muted);
            margin-top: 4px;
            font-family: monospace;
        }

        .alerts {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .alerts h3 {
            color: var(--accent);
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .alert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }
        .alert-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 0.85em;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .alert-item:hover {
            background: rgba(16, 185, 129, 0.15);
            transform: translateX(4px);
        }
        .alert-item.danger { border-left: 3px solid var(--danger); }
        .alert-item.warning { border-left: 3px solid var(--warning); }
        .alert-item.ok { border-left: 3px solid var(--success); opacity: 0.6; }
        .alert-item.ok:hover { opacity: 1; }
        .alert-item.unknown { border-left: 3px solid var(--muted); opacity: 0.7; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-weight: 600;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--accent);
            color: white;
        }
        .card-body { padding: 4px 0; }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .row:last-child { border-bottom: none; }
        .row:hover { background: rgba(255,255,255,0.02); }
        .row.critical { background: rgba(239, 68, 68, 0.08); }
        .row-left { display: flex; flex-direction: column; gap: 2px; }
        .row-label {
            color: var(--muted);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .row-hint {
            font-size: 0.7em;
            color: var(--muted);
            opacity: 0.6;
        }
        .row-value {
            font-size: 0.9em;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
            font-family: 'SF Mono', 'Monaco', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        .row-value:hover { color: var(--accent); }
        .row-value.hash { font-size: 0.8em; color: var(--muted); }
        .row-value.na { color: var(--warning); opacity: 0.8; }
        .row-value.danger { color: var(--danger); }
        .row-value.copied { color: var(--success) !important; }
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .tag.yes { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .tag.no { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .tag.info { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .critical-marker {
            width: 6px;
            height: 6px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .json-panel { margin-top: 24px; }
        .json-toggle {
            width: 100%;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .json-toggle:hover { background: var(--border); }
        .json-box {
            display: none;
            margin-top: 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.8em;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 500px;
            overflow-y: auto;
            color: #8b949e;
        }
        .hidden { display: none; }

        .error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255, 71, 87, 0.5);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--muted);
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-grid"></div>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>CreepJS Fingerprint Analysis</h1>
            <p>Open-source headless & stealth detection</p>
        </div>

        <div id="loading" class="loading">
            <div class="loader"></div>
            <p class="loading-text">Загрузка результатов...</p>
        </div>

        <div id="result" class="hidden"></div>

        <div id="error" class="error hidden">
            <div style="font-size: 1.2em; margin-bottom: 10px;">Результаты не найдены</div>
            <div style="color: var(--muted);">Возможно, проверка ещё не завершена или сессия истекла</div>
            <a href="/" class="btn">Попробовать снова</a>
        </div>

        <div class="footer">
            CreepJS Fingerprint Analysis v4.7
        </div>
    </div>

    <script>
        const sessionId = new URLSearchParams(window.location.search).get('session');
        let jsonData = null;

        const $ = id => document.getElementById(id);

        function escapeHtml(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        async function copyToClipboard(text, el) {
            try {
                await navigator.clipboard.writeText(text);
                el.classList.add('copied');
                setTimeout(() => { el.classList.remove('copied'); }, 1500);
            } catch (e) {
                console.error('Copy failed:', e);
            }
        }

        function tag(val, yesIsBad = true) {
            if (val === true) return `<span class="tag ${yesIsBad ? 'yes' : 'no'}">Yes</span>`;
            if (val === false) return `<span class="tag ${yesIsBad ? 'no' : 'yes'}">No</span>`;
            return `<span class="tag info">N/A</span>`;
        }

        function row(label, value, hint = '', critical = false, isHash = false) {
            const v = value ?? '-';
            const isHTML = typeof v === 'string' && v.includes('<');
            const isNA = !isHTML && (v === 'N/A' || v === '-' || v === 0 || v === '0' || v === '');
            const rowCls = critical === 'danger' ? ' critical' : '';
            const valCls = isHash ? ' hash' : '';
            const statusCls = critical === 'danger' ? ' danger' : (isNA ? ' na' : '');
            const marker = critical === 'danger' ? '<span class="critical-marker"></span>' : '';

            let valueHtml;
            if (isHTML) {
                valueHtml = `<span class="row-value">${v}</span>`;
            } else {
                const safeVal = escapeHtml(String(v));
                const copyVal = String(v).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                valueHtml = `<span class="row-value${valCls}${statusCls}" onclick="copyToClipboard('${copyVal}', this)" title="Клик для копирования">${safeVal}</span>`;
            }

            return `<div class="row${rowCls}">
                <div class="row-left">
                    <span class="row-label">${marker}${label}</span>
                    ${hint ? `<span class="row-hint">${hint}</span>` : ''}
                </div>
                ${valueHtml}
            </div>`;
        }

        function getScoreClass(score) {
            if (score >= 50) return 'high';
            if (score >= 20) return 'medium';
            return 'low';
        }

        function getVerdictText(score) {
            if (score >= 50) return 'Обнаружен';
            if (score >= 20) return 'Подозрительно';
            return 'Чисто';
        }

        function render(data) {
            jsonData = data;
            $('loading').classList.add('hidden');
            $('error').classList.add('hidden');
            $('result').classList.remove('hidden');

            const fp = data.fingerprint || {};
            const summary = data.summary || {};

            // Scores
            const stealth = summary.stealth_score ?? fp.headless?.stealth ?? 0;
            const headless = summary.headless_percent ?? fp.headless?.headlessPercent ?? 0;
            const likeHeadless = summary.like_headless ?? fp.headless?.likeHeadless ?? 0;
            const maxScore = Math.max(stealth, headless, likeHeadless);

            // FP ID
            const fpId = summary.fp_id || fp.fpId || 'N/A';
            const fuzzyHash = summary.fuzzy_hash || fp.fuzzyHash || 'N/A';

            // Resistance
            const resistance = fp.resistance || {};
            const headlessData = fp.headless || {};
            const hardware = fp.hardware || {};
            const browser = fp.browser || {};
            const nav = fp.navigator || {};
            const network = fp.network || {};
            const status = fp.status || {};
            const fingerprints = fp.fingerprints || {};

            // Alerts
            const alerts = [
                { text: 'Stealth', bad: stealth >= 50, warning: stealth >= 20, hint: 'Stealth plugins detected', anchor: 'card-scores' },
                { text: 'Headless', bad: headless >= 50, warning: headless >= 20, hint: 'Headless browser', anchor: 'card-scores' },
                { text: 'Lies', bad: (fp.lies?.count || 0) > 0, hint: 'Обнаружены подмены данных', anchor: 'card-detection' },
                { text: 'Trash', bad: (fp.trash?.count || 0) > 5, warning: (fp.trash?.count || 0) > 0, hint: 'Мусорные данные', anchor: 'card-detection' },
                { text: 'Extension', bad: resistance.extension === 'true' || resistance.extension === true, hint: 'Расширение обнаружено', anchor: 'card-resistance' },
                { text: 'Chromium', bad: headlessData.chromium === false, hint: 'Chromium флаги', anchor: 'card-resistance' },
                { text: 'Canvas', bad: false, unknown: !fingerprints.canvasHash, hint: 'Canvas fingerprint', anchor: 'card-fingerprints' },
                { text: 'WebGL', bad: false, unknown: !fingerprints.webglHash, hint: 'WebGL fingerprint', anchor: 'card-fingerprints' },
                { text: 'Audio', bad: false, unknown: !fingerprints.audioHash, hint: 'Audio fingerprint', anchor: 'card-audio' }
            ];

            // Headless alert class
            let alertClass = 'safe';
            let alertTitle = 'Headless не обнаружен';
            let alertDesc = 'Браузер выглядит как обычный пользователь';

            if (maxScore >= 50) {
                alertClass = 'detected';
                alertTitle = 'Headless/Stealth обнаружен!';
                alertDesc = 'Браузер определён как автоматизированный или модифицированный';
            } else if (maxScore >= 20) {
                alertClass = 'warning';
                alertTitle = 'Подозрительные признаки';
                alertDesc = 'Обнаружены некоторые признаки автоматизации';
            }

            $('result').innerHTML = `
                <div class="fp-id-card">
                    <div class="fp-id-icon">🔐</div>
                    <div class="fp-id-content">
                        <div class="fp-id-label">Fingerprint ID</div>
                        <div class="fp-id-value" onclick="copyToClipboard('${escapeHtml(fpId)}', this)" title="Клик для копирования">${escapeHtml(fpId)}</div>
                        <div class="fp-id-fuzzy" onclick="copyToClipboard('${escapeHtml(fuzzyHash)}', this)" title="Клик для копирования" style="cursor:pointer">Fuzzy: ${escapeHtml(fuzzyHash)}</div>
                    </div>
                </div>

                <div class="headless-alert ${alertClass}">
                    <h2>${alertTitle}</h2>
                    <p>${alertDesc}</p>
                </div>

                <div class="score-section" id="card-scores">
                    <div class="score-card">
                        <div class="score-value ${getScoreClass(stealth)}">${stealth}%</div>
                        <div class="score-label">Stealth Score</div>
                        <div class="score-desc">Обнаружение stealth plugins</div>
                        <div class="verdict ${getScoreClass(stealth)}">${getVerdictText(stealth)}</div>
                    </div>
                    <div class="score-card">
                        <div class="score-value ${getScoreClass(headless)}">${headless}%</div>
                        <div class="score-label">Headless</div>
                        <div class="score-desc">Безголовый браузер</div>
                        <div class="verdict ${getScoreClass(headless)}">${getVerdictText(headless)}</div>
                    </div>
                    <div class="score-card">
                        <div class="score-value ${getScoreClass(likeHeadless)}">${likeHeadless}%</div>
                        <div class="score-label">Like Headless</div>
                        <div class="score-desc">Похож на headless</div>
                        <div class="verdict ${getScoreClass(likeHeadless)}">${getVerdictText(likeHeadless)}</div>
                    </div>
                </div>

                <div class="alerts">
                    <h3>Детекции</h3>
                    <div class="alert-grid">
                        ${alerts.map(a => {
                            let cls, icon;
                            if (a.bad) {
                                cls = 'danger';
                                icon = '✗';
                            } else if (a.warning) {
                                cls = 'warning';
                                icon = '!';
                            } else if (a.unknown) {
                                cls = 'unknown';
                                icon = '?';
                            } else {
                                cls = 'ok';
                                icon = '✓';
                            }
                            return `<a href="#${a.anchor}" class="alert-item ${cls}" title="${a.hint}">${icon} ${a.text}</a>`;
                        }).join('')}
                    </div>
                </div>

                <div class="card" id="card-resistance">
                    <div class="card-header">
                        <span class="card-title">Resistance & Detection</span>
                    </div>
                    <div class="card-body">
                        ${row('Headless Hash', headlessData.hash || 'N/A', 'Headless fingerprint', false, true)}
                        ${row('Resistance Hash', resistance.hash || 'N/A', 'Resistance fingerprint', false, true)}
                        ${row('Privacy Mode', summary.privacy || resistance.privacy, 'Режим приватности')}
                        ${row('Security', summary.security || resistance.security, 'Уровень безопасности')}
                        ${row('Browser Mode', summary.mode || resistance.mode, 'Режим браузера')}
                        ${row('Extension', resistance.extension, 'Обнаружено расширение', resistance.extension === 'true' || resistance.extension === true ? 'danger' : false)}
                        ${row('Chromium', headlessData.chromium !== null && headlessData.chromium !== undefined ? String(headlessData.chromium) : 'N/A', 'Chromium флаги')}
                        ${row('Platform Hints', headlessData.platformHints, 'UA Platform Hints')}

        function toggleJson() {
            const box = $('jsonBox');
            const btn = document.querySelector('.json-toggle');
            const isHidden = getComputedStyle(box).display === 'none';
            box.style.display = isHidden ? 'block' : 'none';

            if (isHidden && jsonData) {
                navigator.clipboard.writeText(JSON.stringify(jsonData, null, 2)).then(() => {
                    btn.textContent = 'JSON скопирован!';
                    setTimeout(() => { btn.textContent = 'Скрыть JSON'; }, 1500);
                });
            } else {
                btn.textContent = 'Показать полный JSON';
            }
        }

        function showError() {
            $('loading').classList.add('hidden');
            $('error').classList.remove('hidden');
        }

        async function loadResult() {
            if (!sessionId) {
                showError();
                return;
            }

            try {
                const resp = await fetch('/api/extension/result/' + sessionId);
                const data = await resp.json();

                if (data.fingerprint) {
                    render(data);
                } else if (data.status === 'pending') {
                    setTimeout(loadResult, 1000);
                } else {
                    showError();
                }
            } catch (e) {
                showError();
            }
        }

        loadResult();
