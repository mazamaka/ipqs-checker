<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CreepJS Fingerprint Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status-text {
            font-size: 14px;
        }
        .status-bar.success {
            background: rgba(46, 213, 115, 0.2);
        }
        .status-bar.error {
            background: rgba(255, 71, 87, 0.2);
        }
        #creep-container {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            min-height: 400px;
        }
        /* Override CreepJS styles for dark header */
        #fp-app {
            font-size: 12px;
        }
        .version-info {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .update-btn {
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.5);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 10px;
        }
        .update-btn:hover {
            background: rgba(102, 126, 234, 0.5);
        }
        .update-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CreepJS Fingerprint Check</h1>
    </div>

    <div class="status-bar" id="statusBar">
        <div class="spinner" id="spinner"></div>
        <span class="status-text" id="statusText">Инициализация CreepJS...</span>
    </div>

    <div id="creep-container">
        <!-- CreepJS will render here -->
        <div id="fp-app">
            <fingerprint>
                <div id="fingerprint-data">
                    <div class="fingerprint-header-container">
                        <div class="fingerprint-header">
                            <div class="ellipsis-all">FP ID: Computing...</div>
                        </div>
                    </div>
                </div>
            </fingerprint>
        </div>
    </div>

    <div class="version-info">
        <span id="versionText">CreepJS: загрузка...</span>
        <button class="update-btn" id="updateBtn" style="display: none;">Обновить</button>
    </div>

    <script src="creep-runner.js"></script>
</body>
</html>
