<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 340px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-align: center;
        }

        /* Service selector */
        .service-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .service-btn {
            flex: 1;
            padding: 10px 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .service-btn:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
        }
        .service-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
            color: white;
        }
        .service-btn .service-name {
            font-weight: 600;
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
        }
        .service-btn .service-desc {
            font-size: 10px;
            opacity: 0.7;
        }
        .service-btn.active .service-desc {
            opacity: 1;
        }

        /* Feature badge */
        .feature-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            margin-top: 4px;
        }
        .badge-antidetect {
            background: rgba(239, 68, 68, 0.3);
            color: #ff6b6b;
        }
        .badge-fraud {
            background: rgba(102, 126, 234, 0.3);
            color: #a5b4fc;
        }
        .badge-headless {
            background: rgba(46, 213, 115, 0.3);
            color: #2ed573;
        }
        .badge-recaptcha {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        .status.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: rgba(255,255,255,0.9);
        }
        .hint {
            margin-top: 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }
        .status.success {
            display: block;
            background: rgba(46, 213, 115, 0.2);
            border: 1px solid rgba(46, 213, 115, 0.5);
        }
        .status.error {
            display: block;
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255, 71, 87, 0.5);
        }
        .debug-section {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .debug-toggle {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            cursor: pointer;
            padding: 5px;
        }
        .debug-toggle:hover {
            color: rgba(255,255,255,0.8);
        }
        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .copy-btn.copied {
            background: rgba(46, 213, 115, 0.3);
            color: #2ed573;
        }
        .debug-logs {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            font-family: monospace;
            font-size: 10px;
            max-height: 200px;
            overflow-y: auto;
            color: rgba(255,255,255,0.7);
        }
        .debug-logs.show {
            display: block;
        }
        .log-entry {
            margin-bottom: 4px;
            word-break: break-all;
        }

        /* History section */
        .history-section {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .history-title {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            font-weight: 600;
        }
        .clear-history {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .clear-history:hover {
            color: #ff4757;
        }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .history-item:hover {
            background: rgba(102, 126, 234, 0.2);
        }
        .history-item-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .history-item-service {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }
        .history-item-time {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }
        .history-item-score {
            font-size: 14px;
            font-weight: 600;
        }
        .history-item-score.low { color: #2ed573; }
        .history-item-score.medium { color: #ffa502; }
        .history-item-score.high { color: #ff4757; }
        .history-empty {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            padding: 15px;
        }
    </style>
</head>
<body>
    <h2>Fingerprint Checker</h2>

    <div class="service-selector">
        <button class="service-btn active" data-service="ipqs">
            <span class="service-name">IPQS</span>
            <span class="service-desc">indeed.com</span>
            <span class="feature-badge badge-fraud">Fraud Score</span>
        </button>
        <button class="service-btn" data-service="fingerprint">
            <span class="service-name">FP Pro</span>
            <span class="service-desc">fingerprint.com</span>
            <span class="feature-badge badge-antidetect">Anti-detect</span>
        </button>
        <button class="service-btn" data-service="creepjs">
            <span class="service-name">CreepJS</span>
            <span class="service-desc">creepjs.com</span>
            <span class="feature-badge badge-headless">Headless</span>
        </button>
        <button class="service-btn" data-service="antcpt">
            <span class="service-name">AntCpt</span>
            <span class="service-desc">antcpt.com</span>
            <span class="feature-badge badge-recaptcha">reCAPTCHA</span>
        </button>
    </div>

    <button class="btn btn-primary" id="checkBtn">
        Проверить фингерпринт
    </button>

    <div class="status" id="status"></div>

    <div class="hint" id="hint" style="display: none;">
        Проверка может занять до 60 сек
    </div>

    <div class="history-section" id="historySection">
        <div class="history-header">
            <span class="history-title">История проверок</span>
            <button class="clear-history" id="clearHistory">Очистить</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">Нет проверок</div>
        </div>
    </div>

    <div class="debug-section">
        <div class="debug-header">
            <button class="debug-toggle" id="debugToggle">Логи</button>
            <button class="copy-btn" id="copyBtn" style="display: none;">Копировать</button>
        </div>
        <div class="debug-logs" id="debugLogs"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
