<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            margin: 0;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        .status.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: rgba(255,255,255,0.9);
        }
        .status.success {
            display: block;
            background: rgba(46, 213, 115, 0.2);
            border: 1px solid rgba(46, 213, 115, 0.5);
        }
        .status.error {
            display: block;
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255, 71, 87, 0.5);
        }
        .last-check {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
        .fraud-score {
            font-size: 24px;
            font-weight: bold;
            margin: 8px 0;
        }
        .fraud-low { color: #2ed573; }
        .fraud-medium { color: #ffa502; }
        .fraud-high { color: #ff4757; }

        .debug-section {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .debug-toggle {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            cursor: pointer;
            padding: 5px;
        }
        .debug-toggle:hover {
            color: rgba(255,255,255,0.8);
        }
        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .copy-btn.copied {
            background: rgba(46, 213, 115, 0.3);
            color: #2ed573;
        }
        .debug-logs {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            font-family: monospace;
            font-size: 10px;
            max-height: 200px;
            overflow-y: auto;
            color: rgba(255,255,255,0.7);
        }
        .debug-logs.show {
            display: block;
        }
        .log-entry {
            margin-bottom: 4px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h2>IPQS Fingerprint Checker</h2>

    <button class="btn btn-primary" id="checkBtn">
        Проверить мой фингерпринт
    </button>

    <div class="status" id="status"></div>

    <div class="last-check" id="lastCheck" style="display: none;">
        <div>Последняя проверка:</div>
        <div class="fraud-score" id="fraudScore"></div>
        <div id="checkTime"></div>
    </div>

    <div class="debug-section">
        <div class="debug-header">
            <button class="debug-toggle" id="debugToggle">Показать логи</button>
            <button class="copy-btn" id="copyBtn" style="display: none;">Копировать</button>
        </div>
        <div class="debug-logs" id="debugLogs"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
