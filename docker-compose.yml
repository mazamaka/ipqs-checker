services:
  ipqs:
    build: .
    restart: unless-stopped
    env_file:
      - stack.env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
