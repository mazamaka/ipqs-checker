services:
  ipqs:
    build: .
    restart: unless-stopped
    environment:
      - DOCKER=1
      - WORKERS=${WORKERS:-1}
      - IPQS_DOMAIN=${IPQS_DOMAIN:-indeed.com}
      - IPQS_API_KEY=${IPQS_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-ipqs}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ipqs_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ipqs_checker}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_TOKEN_SECRET=${ADMIN_TOKEN_SECRET:-change_me_secret}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ipqs}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ipqs_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ipqs_checker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipqs} -d ${POSTGRES_DB:-ipqs_checker}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
