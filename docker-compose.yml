services:
  ipqs:
    build: .
    restart: unless-stopped
    environment:
      - DOCKER=1
      - WORKERS=${WORKERS:-1}
      - IPQS_DOMAIN=${IPQS_DOMAIN:-indeed.com}
      - IPQS_API_KEY=${IPQS_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
