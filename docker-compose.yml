services:
  ipqs:
    build: .
    restart: unless-stopped
    environment:
      - DOCKER=1
      - IPQS_API_KEY=${IPQS_API_KEY}
      - IPQS_DOMAIN=${IPQS_DOMAIN:-indeed.com}
      - WORKERS=${WORKERS:-1}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
