<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - IPQS Admin</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e0;
            --muted: #6b7280;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Navigation */
        .nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .nav-brand {
            font-weight: 600;
            font-size: 1.1em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand:hover { text-decoration: none; }
        .nav-links {
            display: flex;
            gap: 8px;
        }
        .nav-link {
            padding: 8px 16px;
            border-radius: 6px;
            color: var(--muted);
            transition: all 0.2s;
        }
        .nav-link:hover {
            background: var(--border);
            color: var(--text);
            text-decoration: none;
        }
        .nav-link.active {
            background: var(--accent);
            color: white;
        }
        .nav-logout {
            color: var(--danger);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* Page header */
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 1.5em;
            font-weight: 600;
        }
        .page-header p {
            color: var(--muted);
            margin-top: 4px;
        }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-title {
            font-weight: 600;
        }
        .card-body {
            padding: 20px;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-label {
            color: var(--muted);
            font-size: 0.9em;
            margin-top: 4px;
        }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: var(--danger); }

        /* Tables */
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 600;
            color: var(--muted);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-muted { background: var(--border); color: var(--muted); }

        /* Forms */
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1em;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 1em;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            text-decoration: none;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }
        .pagination a, .pagination span {
            padding: 8px 14px;
            border-radius: 6px;
            background: var(--card);
            border: 1px solid var(--border);
        }
        .pagination a:hover {
            background: var(--border);
            text-decoration: none;
        }
        .pagination .active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters .form-input {
            width: auto;
            min-width: 200px;
        }
        .filters select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Alert */
        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alert-danger {
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        /* Flag indicator */
        .flag-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .flag-indicator.flagged { background: var(--danger); }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title {
            font-weight: 600;
            font-size: 1.1em;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5em;
            cursor: pointer;
            padding: 0 8px;
        }
        .modal-close:hover {
            color: var(--text);
        }
        .modal-body {
            padding: 20px;
            overflow: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .json-content {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 60vh;
            overflow: auto;
        }
        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: #2a2a3a;
            text-decoration: none;
        }
        .btn-icon {
            padding: 4px 8px;
            font-size: 0.75em;
            vertical-align: middle;
        }
        .copy-success {
            color: var(--success);
            font-size: 0.85em;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/admin" class="nav-brand">IPQS Admin</a>
            <div class="nav-links">
                <a href="/admin" class="nav-link {% if page_title == 'Dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/admin/profiles" class="nav-link {% if 'Профил' in page_title %}active{% endif %}">Профили</a>
                <a href="/admin/history" class="nav-link {% if page_title == 'История проверок' %}active{% endif %}">История</a>
                <a href="/admin/logout" class="nav-link nav-logout">Выход</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- JSON Modal -->
    <div class="modal-overlay" id="jsonModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Raw JSON Response</span>
                <button class="modal-close" onclick="closeJsonModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre class="json-content" id="jsonContent"></pre>
            </div>
            <div class="modal-footer">
                <span class="copy-success" id="copySuccess" style="display: none;">Скопировано!</span>
                <button class="btn btn-secondary" onclick="copyJson()">Копировать</button>
                <button class="btn btn-primary" onclick="closeJsonModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let currentJsonData = '';

        function showJsonModal(jsonData) {
            currentJsonData = typeof jsonData === 'string' ? jsonData : JSON.stringify(jsonData, null, 2);
            document.getElementById('jsonContent').textContent = currentJsonData;
            document.getElementById('jsonModal').classList.add('active');
            document.getElementById('copySuccess').style.display = 'none';
        }

        function closeJsonModal() {
            document.getElementById('jsonModal').classList.remove('active');
        }

        function copyJson() {
            navigator.clipboard.writeText(currentJsonData).then(() => {
                const successEl = document.getElementById('copySuccess');
                successEl.style.display = 'inline';
                setTimeout(() => { successEl.style.display = 'none'; }, 2000);
            });
        }

        // Close modal on overlay click
        document.getElementById('jsonModal').addEventListener('click', function(e) {
            if (e.target === this) closeJsonModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeJsonModal();
        });
    </script>
</body>
</html>
